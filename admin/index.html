<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Support Panel | Velocube</title>

  <link rel="icon" type="image/png" href="../assets/favicon.png">

  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&amp;f[]=switzer@400,500,600&amp;display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ================= Login ================= -->
  <div class="login-screen" id="login-screen" hidden>
    <div class="login-card">
      <div class="login-brand">
        <img src="../assets/glyph.png" alt="" width="274" height="315">
        <span class="brand-word"><span class="bw-velo">Velo</span>cube</span>
      </div>
      <p class="panel-tag">Support Panel</p>

      <form id="login-form" novalidate>
        <label>Email
          <input class="input" id="login-email" type="email" autocomplete="username" required>
        </label>
        <label>Password
          <input class="input" id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <p class="login-error" id="login-error"></p>
        <button class="btn primary" type="submit" style="width: 100%;">Sign In</button>
      </form>

      <div class="demo-note" id="demo-note" hidden>
        <strong>Demo Mode</strong>
        Sign in with demo@velocube.net and password VeloDemo2026. Accounts are created by admins once Supabase is connected.
      </div>
    </div>
  </div>

  <!-- ================= App ================= -->
  <div class="app" id="app" hidden>
    <aside class="sidebar">
      <div class="side-brand">
        <img src="../assets/glyph.png" alt="" width="274" height="315">
        <div>
          <span class="brand-word"><span class="bw-velo">Velo</span>cube</span>
          <span class="panel-tag">Support Panel</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="Panel navigation">
        <a href="#/dashboard" data-nav="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#/accounts" data-nav="accounts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Accounts</span>
        </a>
        <a href="#/tickets" data-nav="tickets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><path d="M13 5v2M13 17v2M13 11v2"/></svg>
          <span>Tickets</span>
        </a>
        <a href="#/guides" data-nav="guides">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Help Guides</span>
        </a>
      </nav>

      <div class="agent-card">
        <span class="agent-avatar" id="agent-avatar"></span>
        <p>
          <span class="agent-name" id="agent-name"></span><br>
          <span class="agent-role" id="agent-role"></span>
        </p>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="topbar-search">
          <input class="input" id="global-search" type="search" placeholder="Search accounts by ID, name, or email..." autocomplete="off">
          <div class="search-results" id="search-results" hidden></div>
        </div>
        <span class="mode-chip" id="mode-chip">Demo Mode</span>
        <button class="btn ghost" id="logout-btn" type="button">Log Out</button>
      </div>

      <main id="view"></main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
